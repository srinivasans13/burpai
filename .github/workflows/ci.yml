name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build fat jar
        run: ./gradlew jar --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: burp-ai-pentester-jar
          path: dist/*.jar
          retention-days: 7
